server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: matching-platform
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/boss_matching?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: ${MYSQL_DRIVER:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      schema-locations:
        - classpath:db/schema.sql
        - classpath:db/migration-20260617-extended-profile.sql
      data-locations: classpath:db/seed.sql
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  mock-enabled: ${APP_MOCK_ENABLED:true}
  data:
    provider: ${DATA_PROVIDER:mysql}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-root: ${LOCAL_STORAGE_ROOT:./data/uploads}
  cache:
    provider: ${CACHE_PROVIDER:memory}
  payment:
    provider: ${PAYMENT_PROVIDER:mock}
    unlock-amount-cent: ${UNLOCK_AMOUNT_CENT:990}
  wechat:
    app-id: ${WECHAT_APP_ID:mock-wechat-app-id}
    app-secret: ${WECHAT_APP_SECRET:mock-wechat-app-secret}
  auth:
    mock-code: ${AUTH_MOCK_CODE:123456}
    jwt-secret: ${JWT_SECRET:dev-secret-change-me}
    token-ttl-seconds: ${JWT_TOKEN_TTL_SECONDS:86400}
